# Workflow de GitHub Actions para desplegar el Bar Speakeasy directamente a GitHub Pages

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Otorgar permisos necesarios para escribir en Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evitar colisiones de despliegue concurrente
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código Fuente
        uses: actions/checkout@v4

      - name: Configurar Entorno de GitHub Pages
        uses: actions/configure-pages@v5

      - name: Cargar Archivos Estáticos de Producción (Raíz)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Desplegar en Producción de Pages
        id: deployment
        uses: actions/deploy-pages@v4
